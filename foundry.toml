[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.default.fuzz]
runs = 1024
max_test_rejects = 1_000_000

[profile.ci.fuzz]
runs = 10_000

[profile.default.invariant]
runs = 256
depth = 50
fail_on_revert = false

[profile.ci.invariant]
runs = 1_000
depth = 100

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
rayls_testnet = "${RAYLS_TESTNET_RPC}"
